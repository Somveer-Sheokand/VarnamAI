version: '3.8'

services:
  varnamai:
    build: .
    container_name: varnamai_app
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
